<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tienda - Categorías y Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
  <div class="container mt-5">

    <!-- Tabla de Categorías -->
    <h1 class="text-center mb-4">Lista de Categorías</h1>
    <div class="mb-3 text-end">
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCategoria">Crear Categoría</button>
    </div>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Editar</th>
          <th>Eliminar</th>
        </tr>
      </thead>
      <tbody id="tabla-categorias"></tbody>
    </table>

    <!-- Tabla de Productos -->
    <h1 class="text-center mb-4">Lista de Productos</h1>
    <div class="mb-3 text-end">
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalProducto">Crear Producto</button>
    </div>
    <table class="table table-bordered table-hover">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Categoría</th>
          <th>Editar</th>
          <th>Eliminar</th>
        </tr>
      </thead>
      <tbody id="tabla-productos"></tbody>
    </table>
  </div>

  <!-- Modal Crear Categoría -->
  <div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog">
      <form id="formCategoria" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Crear Categoría</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="nombreCat" class="form-control mb-2" placeholder="Nombre">
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Guardar</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal Crear Producto -->
  <div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog">
      <form id="formProducto" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Crear Producto</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="text" id="nombreProd" class="form-control mb-2" placeholder="Nombre">
          <input type="number" id="precio" class="form-control mb-2" placeholder="Precio">
          <input type="number" id="stock" class="form-control mb-2" placeholder="Stock">
          <input type="number" id="categoria_id" class="form-control mb-2" placeholder="Categoría ID">
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Guardar</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Cargar categorías
    function cargarCategorias(){
      fetch('/categorias')
        .then(res=>res.json())
        .then(data=>{
          const tabla=document.getElementById('tabla-categorias');
          tabla.innerHTML='';
          data.forEach(c=>{
            tabla.innerHTML+=`
              <tr id="cat-${c.id}">
                <td>${c.id}</td>
                <td>${c.nombre}</td>
                <td><button class="btn btn-warning btn-sm" onclick="editarCategoria(${c.id})">Editar</button></td>
                <td><button class="btn btn-danger btn-sm" onclick="eliminarCategoria(${c.id})">Eliminar</button></td>
              </tr>`;
          });
        });
    }

    // Cargar productos
    function cargarProductos(){
      fetch('/productos')
        .then(res=>res.json())
        .then(data=>{
          const tabla=document.getElementById('tabla-productos');
          tabla.innerHTML='';
          data.forEach(p=>{
            tabla.innerHTML+=`
              <tr id="prod-${p.id}">
                <td>${p.id}</td>
                <td>${p.nombre}</td>
                <td>${p.precio}</td>
                <td>${p.stock}</td>
                <td>${p.categoria_id}</td>
                <td><button class="btn btn-warning btn-sm" onclick="editarProducto(${p.id})">Editar</button></td>
                <td><button class="btn btn-danger btn-sm" onclick="eliminarProducto(${p.id})">Eliminar</button></td>
              </tr>`;
          });
        });
    }

    // Crear categoría
    document.getElementById('formCategoria').addEventListener('submit',e=>{
      e.preventDefault();
      const datos={nombre:document.getElementById('nombreCat').value};
      fetch('/categorias',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(datos)})
        .then(res=>res.json())
        .then(data=>{
          Swal.fire("Éxito",data.mensaje,"success");
          cargarCategorias();
          bootstrap.Modal.getInstance(document.getElementById('modalCategoria')).hide();
        });
    });

    // Crear producto
    document.getElementById('formProducto').addEventListener('submit',e=>{
      e.preventDefault();
      const datos={
        nombre:document.getElementById('nombreProd').value,
        precio:parseFloat(document.getElementById('precio').value),
        stock:parseInt(document.getElementById('stock').value),
        categoria_id:parseInt(document.getElementById('categoria_id').value)
      };
      fetch('/productos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(datos)})
        .then(res=>res.json())
        .then(data=>{
          Swal.fire("Éxito",data.mensaje,"success");
          cargarProductos();
          bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
        });
    });

    // Eliminar categoría
    function eliminarCategoria(id){
      Swal.fire({title:"¿Eliminar categoría?",icon:"warning",showCancelButton:true}).then(result=>{
        if(result.isConfirmed){
          fetch(`/categoria/${id}`,{method:'DELETE'})
            .then(res=>res.json())
            .then(data=>{
              document.getElementById(`cat-${id}`).remove();
              Swal.fire("Eliminado",data.mensaje,"success");
            });
        }
      });
    }

    // Eliminar producto
    function eliminarProducto(id){
      Swal.fire({title:"¿Eliminar producto?",icon:"warning",showCancelButton:true}).then(result=>{
        if(result.isConfirmed){
          fetch(`/productos/${id}`,{method:'DELETE'})
            .then(res=>res.json())
            .then(data=>{
              document.getElementById(`prod-${id}`).remove();
              Swal.fire("Eliminado",data.mensaje,"success");
            });
        }
      });
    }

    // Editar categoría
    function editarCategoria(id){
      fetch(`/categoria/${id}`)
        .then(res=>res.json())
        .then(data=>{
          const c=data[0];
          Swal.fire({
            title:'Editar Categoría',
            html:`<input id="swal-nombre-cat" class="swal2-input" value="${c.nombre}">`,
            showCancelButton:true,
            confirmButtonText:'Actualizar',
            preConfirm:()=>{
              return {nombre:document.getElementById('swal-nombre-cat').value}
            }
          }).then(result=>{
            if(result.isConfirmed){
              fetch(`/categorias/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(result.value)})
                .then(res=>res.json())
                .then(data=>{
                  Swal.fire("Actualizado",data.mensaje,"success");
                  cargarCategorias();
                });
            }
          });
        });
    }

    // Editar producto con SweetAlert formulario
    function editarProducto(id){
    fetch(`/productos/${id}`)
        .then(res=>res.json())
        .then(data=>{
        const p = data[0]; // si tu backend devuelve objeto directo, usa const p=data;
        Swal.fire({
            title:'Editar Producto',
            html:`
            <input id="swal-nombre" class="swal2-input" placeholder="Nombre" value="${p.nombre}">
            <input id="swal-precio" type="number" class="swal2-input" placeholder="Precio" value="${p.precio}">
            <input id="swal-stock" type="number" class="swal2-input" placeholder="Stock" value="${p.stock}">
            <input id="swal-cat" type="number" class="swal2-input" placeholder="Categoría ID" value="${p.categoria_id}">
            `,
            showCancelButton:true,
            confirmButtonText:'Actualizar',
            preConfirm:()=>{
            const nombre=document.getElementById('swal-nombre').value;
            const precio=parseFloat(document.getElementById('swal-precio').value);
            const stock=parseInt(document.getElementById('swal-stock').value);
            const categoria_id=parseInt(document.getElementById('swal-cat').value);
            if(!nombre || isNaN(precio) || isNaN(stock) || isNaN(categoria_id)){
                Swal.showValidationMessage('Todos los campos son obligatorios y deben ser válidos');
                return false;
            }
            return {nombre,precio,stock,categoria_id};
            }
        }).then(result=>{
            if(result.isConfirmed){
            fetch(`/productos/${id}`,{
                method:'PUT',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify(result.value)
            })
            .then(res=>res.json())
            .then(data=>{
                Swal.fire("Actualizado",data.mensaje,"success");
                cargarProductos();
            });
            }
        });
        });
    }
    document.addEventListener("DOMContentLoaded", () => {
        cargarCategorias();
        cargarProductos();
    });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
